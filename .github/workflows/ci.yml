name: CI — Lint & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    name: ShellCheck
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          for f in install.sh install-exit.sh install-relay.sh; do
            [ -f "$f" ] && shellcheck -S warning "$f" && echo "✅ $f passed"
          done

  bash-syntax:
    runs-on: ubuntu-latest
    name: Bash Syntax
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          for f in install.sh install-exit.sh install-relay.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "✅ $f syntax OK"
          done
