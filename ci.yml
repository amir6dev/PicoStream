name: CI — Lint & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    name: ShellCheck
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -S warning install.sh

  bash-syntax:
    runs-on: ubuntu-latest
    name: Bash Syntax
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: bash -n install.sh && echo "✅ Syntax OK"
